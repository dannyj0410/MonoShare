      "name": "How to Share a Secret Securely with MonoShare",

        },
        {
          "@type": "HowToStep",
          "position": 2,
          "name": "Share the generated link",

        },
        {
          "@type": "HowToStep",

          "acceptedAnswer": {
            "@type": "Answer",

        },
        {
          "@type": "Question",

          "name": "Does MonoShare work without creating an account?",
